name: Deploy Backend

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - ".github/workflows/deploy_backend.yml"
      - "config/backend_config.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
      APP_NAME: ${{ secrets.APP_NAME }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
      RUSTFS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
      RUSTFS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
      RUSTFS_ENDPOINT: ${{ secrets.RUSTFS_ENDPOINT }}

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 设置 Go 环境
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.26.1" # 设置 Go 版本

      - name: Fill secrets into config.yml
        run: |
          cd backend
          # 使用 envsubst 替换占位符
          envsubst < ../config/backend_config.yml > config.yml

      # 安装依赖
      - name: Install dependencies
        run: |
          cd backend
          go mod tidy

      # 构建 Go 应用
      - name: Build Go application
        run: |
          cd backend
          go build -o blog-server ./cmd

      # 上传构建好的文件
      - name: Archive build artifacts
        run: |
          cd backend
          tar -czf backend.tar.gz blog-server config.yml

      # 上传到服务器
      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/backend.tar.gz"
          target: "~/projects/blog"

      # 通过 SSH 在服务器上部署
      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            export PNPM_HOME="$HOME/.local/share/pnpm"
            case ":$PATH:" in
              *":$PNPM_HOME:"*) ;;
              *) export PATH="$PNPM_HOME:$PATH" ;;
            esac
            APP_DIR="$HOME/projects/blog/backend"
            cd "$APP_DIR"

            echo "📦 解压产物"
            rm -f blog-server
            tar -xzf backend.tar.gz
            rm -f backend.tar.gz

            echo "🚀 启动 Go 应用"
            pm2 start blog-server --name blog-server || pm2 restart blog-server
            pm2 save

            echo "✅ 部署完成"
